[api]
port = 8010
mode = "PROD"
root = "/api"
log_path = "./logs"
log_level = "INFO"
is_readonly = false

[generated_file]
db_path = "./data/generated_files.sqlite3"
ttl_seconds = 10800

[auth]
enabled = true
issuer_url = "http://keycloak:8080/keycloak/realms/vn1"
jwks_url = "http://keycloak:8080/keycloak/realms/vn1/protocol/openid-connect/certs"
token_url = "http://keycloak:8080/keycloak/realms/vn1/protocol/openid-connect/token"
client_id = "vn1-api"
audience = ""
required_roles = ["vn1-user"]

[rate_limit]
default = "5/minute"
