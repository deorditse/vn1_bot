events {}

http {
    include       mime.types;

    error_log /var/log/nginx/error.log warn;
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        listen [::]:80;

        server_name ai-bot.vn1.ru;


        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api/ {
            set $backend http://backend-vn1:8010;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $backend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
        }

        location /keycloak/ {
            set $keycloak http://keycloak:8080;
            proxy_pass $keycloak;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
        }

        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        keepalive_timeout   70;

        server_name ai-bot.vn1.ru;

        ssl_certificate     /etc/letsencrypt/live/ai-bot.vn1.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ai-bot.vn1.ru/privkey.pem;

        location ~* /(wp-admin|wordpress|shop|oldsite) {
            return 403;
        }

        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

