events {}

http {
    include       mime.types;

    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        listen [::]:80;

        server_name ai-bot.vn1.ru;


        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }


        location / {
            return 301 https://ai-bot.vn1.ru$request_uri;
        }


    }

}

