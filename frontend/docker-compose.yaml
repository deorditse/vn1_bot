networks:
  vn1:
    name: vn1

services:
  frontend:
    build:
      context: ${REPO_ROOT:-.}
      dockerfile: frontend/Dockerfile
    environment:
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-/api}
      GENERATOR_API_BASE_URL: ${FRONTEND_GENERATOR_API_BASE_URL:-/generator-api}
      AUTH_BASE_URL: ${FRONTEND_AUTH_BASE_URL:-/auth}
    restart: unless-stopped
    networks:
      - vn1
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"
