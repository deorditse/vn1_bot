networks:
    vn1:

x-common-env:
  DOMAIN_NAME: ${DOMAIN_NAME}
  HTTP: ${HTTP}
  CATALOG: ${CATALOG}
  N8N_PORT: ${N8N_PORT}

services:
    n8n-vn1:
        ports:
            - "${N8N_PORT}:${N8N_PORT}"
        container_name: n8n-vn1
        image: docker.n8n.io/n8nio/n8n:latest
        environment:
            - N8N_HOST=deorbot.ru
            - WEBHOOK_URL=https://deorbot.ru/vn1/
            - N8N_PATH=/vn1/
            - N8N_PORT=5678
            - N8N_ENDPOINT_WEBHOOK_TEST=webhook-test
            - N8N_SECURE_COOKIE=false
            - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
            - N8N_RUNNERS_ENABLED=true
            - N8N_TRUST_PROXY=true
            - DB_SQLITE_POOL_SIZE=5
            - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
            - N8N_GIT_NODE_DISABLE_BARE_REPOS=true

        volumes:
            - ./data:/home/node/.n8n
            - ./shared:/data
            - /var/run/docker.sock:/var/run/docker.sock
        restart: unless-stopped
        networks:
            - vn1
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "1"

    backend-vn1:
        container_name: backend-vn1
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "8010:8010"
        environment:
            - PYTHONUNBUFFERED=1
            - API_PORT=8010
            - API_MODE=prod
            - OPENAI_API_KEY=${OPENAI_API_KEY}
        restart: unless-stopped
        networks:
            - vn1
