networks:
  vn1:

volumes:
  keycloak_data:

services:
  nginx:
    container_name: nginx
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf/:/etc/letsencrypt/:ro
      - ./certbot/www/:/var/www/certbot/

    restart: unless-stopped
    depends_on:
      - frontend
      - backend-vn1
      - keycloak
    #      - n8n-vn1
    networks:
      - vn1
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - vn1
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"

  certbot:
    image: certbot/certbot:latest
    command: >
      sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot;
      sleep 12h;
      done"
    volumes:
      - ./certbot/conf/:/etc/letsencrypt/:rw
      - ./certbot/www/:/var/www/certbot/:rw
    networks:
      - vn1
    logging:
      driver: "none"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admindeor}
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/keycloak
      - KC_PROXY_HEADERS=xforwarded
      - KC_HOSTNAME_STRICT=false
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    restart: unless-stopped
    networks:
      - vn1
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"

  backend-vn1:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8010"
    environment:
      - PYTHONUNBUFFERED=1
      - LANGCHAIN_OPENAI_TCP_KEEPALIVE=0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GIGACHAT_API_KEY=${GIGACHAT_API_KEY:-}
      - AUTH_CLIENT_SECRET=${AUTH_CLIENT_SECRET:-}

      # Temporarily use external SOCKS5 proxy instead of xray.
      # - PROXY=${PROXY}
      # - ALL_PROXY=socks5h://xray:10808
      # - HTTP_PROXY=socks5h://xray:10808
      # - HTTPS_PROXY=socks5h://xray:10808
      - PROXY=socks5h://proxyuser:qRR7BQ9GCuRMydA4nrUKxEfsyMj8fyYR@185.169.107.20:1080
      - ALL_PROXY=socks5h://proxyuser:qRR7BQ9GCuRMydA4nrUKxEfsyMj8fyYR@185.169.107.20:1080
      - HTTP_PROXY=socks5h://proxyuser:qRR7BQ9GCuRMydA4nrUKxEfsyMj8fyYR@185.169.107.20:1080
      - HTTPS_PROXY=socks5h://proxyuser:qRR7BQ9GCuRMydA4nrUKxEfsyMj8fyYR@185.169.107.20:1080
