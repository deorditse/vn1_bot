networks:
  vn1:
    name: vn1

services:
  nginx:
    container_name: nginx
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${REPO_ROOT:-.}/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${REPO_ROOT:-.}/shared/certbot/conf/:/etc/letsencrypt/:ro
      - ${REPO_ROOT:-.}/shared/certbot/www/:/var/www/certbot/
    restart: unless-stopped
    depends_on:
      - frontend
      - api-gateway
      - auth-service
      - backend-vn1
      - keycloak
    networks:
      - vn1
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"
