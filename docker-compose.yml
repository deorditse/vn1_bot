networks:
  vn1:

services:
  n8n-vn1:
    expose:
      - "5678"
    #    ports:
    #      - "5678:5678"
    container_name: n8n-vn1
    image: docker.n8n.io/n8nio/n8n:latest
    environment:
      - N8N_HOST=ai-bot.vn1.ru
      - WEBHOOK_URL=https://ai-bot.vn1.ru/vn1/
      - N8N_PATH=/vn1/
      - N8N_PORT=5678
      - N8N_ENDPOINT_WEBHOOK_TEST=webhook-test
      - N8N_SECURE_COOKIE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_TRUST_PROXY=true
      - DB_SQLITE_POOL_SIZE=5
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_GIT_NODE_DISABLE_BARE_REPOS=true
      - N8N_PROXY_HOPS=1
      - N8N_PROTOCOL=https
    volumes:
      - ./data:/home/node/.n8n
      - ./shared:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - vn1
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"

  nginx:
    container_name: nginx
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf/:/etc/letsencrypt/:ro
      - ./certbot/www/:/var/www/certbot/

    restart: unless-stopped
    depends_on:
      - backend-vn1
      - n8n-vn1
    networks:
      - vn1
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"

  certbot:
    image: certbot/certbot:latest
    command: >
      sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot;
      sleep 12h;
      done"
    volumes:
      - ./certbot/conf/:/etc/letsencrypt/:rw
      - ./certbot/www/:/var/www/certbot/:rw
    networks:
      - vn1
    logging:
      driver: "none"

  backend-vn1:
    container_name: backend-vn1
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8010"
    environment:
      - PYTHONUNBUFFERED=1
      - API_PORT=8010
      - API_MODE=PROD
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PROXY=${PROXY}
      -
      - ALL_PROXY=socks5h://xray:10808
      - HTTP_PROXY=socks5h://xray:10808
      - HTTPS_PROXY=socks5h://xray:10808
      - NO_PROXY=localhost,127.0.0.1,nginx,n8n-vn1
    restart: unless-stopped
    depends_on:
      - xray
    networks:
      - vn1

  xray:
    image: teddysun/xray
    container_name: xray
    restart: unless-stopped
    volumes:
      - ./xray-config/config.json:/etc/xray/config.json:ro
    command: xray run -config /etc/xray/config.json
    networks:
      - vn1
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"